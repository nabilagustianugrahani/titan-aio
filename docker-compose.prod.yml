# Titan AIO — Production Docker Compose
version: '3.8'

services:
  titan:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: titan-aio
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/titan.db
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: MongoDB Atlas (cloud, no local container needed)
  # Just set MONGODB_URI in .env

  # Optional: Redis for caching (lightweight)
  redis:
    image: redis:7-alpine
    container_name: titan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 80M

volumes:
  redis_data:
